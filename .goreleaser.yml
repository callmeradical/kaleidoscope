version: 2

project_name: kaleidoscope

before:
  hooks:
    - go mod tidy

builds:
  - main: .
    binary: ks
    ldflags:
      - -s -w -X main.version={{.Version}}
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - formats: ["tar.gz"]
    name_template: "ks_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

homebrew_casks:
  - repository:
      owner: callmeradical
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    name: ks-cli
    binaries:
      - ks
    homepage: "https://github.com/callmeradical/kaleidoscope"
    description: "AI agent front-end design toolkit"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
